<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Food Service — Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- HEADER / MENÚ DE AYUDA -->
    <header class="absolute top-0 left-0 w-full p-5 flex justify-center sm:justify-end z-40">
        <nav class="flex gap-6">
            <a href="manual_usuario.pdf" target="_blank" class="text-[10px] text-gray-500 hover:text-cyan-400 font-black uppercase tracking-widest transition-colors flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                Manual de Usuario
            </a>
            <button onclick="toggleModal('help-modal')" class="text-[10px] text-gray-500 hover:text-cyan-400 font-black uppercase tracking-widest transition-colors flex items-center gap-1.5 cursor-pointer bg-transparent border-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Guía de Ayuda
            </button>
        </nav>
    </header>

    <div class="w-full max-w-sm fade-in">

        <!-- Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-cyan-600/20
                        border border-cyan-500/30 mb-4 text-3xl">
                🍔
            </div>
            <p class="text-cyan-500 text-[10px] font-black uppercase tracking-[0.35em] mb-1">
                Sistema de Gestión
            </p>
            <h1 class="text-5xl font-black text-white uppercase"
                style="font-family:'Bebas Neue',sans-serif; letter-spacing:0.04em; line-height:1">
                Fast Food<br>Service
            </h1>
            <p class="text-[10px] text-gray-600 mt-2 uppercase tracking-widest">Plataforma Corporativa v2.0</p>
        </div>

        <!-- Card login -->
        <div class="card border-t-4 border-cyan-500">

            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-5">
                Iniciar Sesión
            </h2>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase tracking-widest block mb-1.5 font-bold">
                        Nombre de usuario
                    </label>
                    <input id="login-nombre" type="text" placeholder="Tu nombre registrado"
                           class="input-style" required autocomplete="username">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase tracking-widest block mb-1.5 font-bold">
                        Contraseña
                    </label>
                    <div class="relative">
                        <input id="login-pass" type="password" placeholder="••••••••"
                               class="input-style pr-10" required autocomplete="current-password">
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300
                                   transition-colors text-sm select-none">
                            👁
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="btn-primary w-full font-black uppercase tracking-widest py-4 text-sm mt-2">
                    Ingresar al Sistema →
                </button>
            </form>

            <div class="mt-5 pt-4 border-t border-gray-800 text-center space-y-2">
                <p class="text-xs text-gray-600">¿Eres nuevo en el equipo?</p>
                <a href="registro1.html"
                   class="text-cyan-500 hover:text-cyan-400 text-xs font-black uppercase tracking-widest
                          transition-colors block">
                    Crear cuenta de empleado →
                </a>
            </div>
        </div>

        <!-- Info empleados registrados -->
        <p id="user-count" class="text-center text-[10px] text-gray-600 mt-4 uppercase tracking-wider">
            Cargando...
        </p>

    </div>

    <div id="creator-watermark">Fast Food Service © SENA 2025</div>

    <script src="registro.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('login-pass');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
    
</body>
</html>
